name: keep-warm

# Pings the key-proxy's health endpoint on a schedule. Free on this public repo
# (unlimited Actions minutes). Doubles as an uptime check — a failed run emails
# you that the proxy is unreachable. Note: GitHub's scheduled runs are best-effort
# and can be delayed/skipped under load, and the schedule is auto-disabled after
# 60 days with no repo activity.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping proxy /api/ping
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 \
            https://bavarian-api.vibecode.review/api/ping)
          echo "proxy health → HTTP $code"
          test "$code" = "200"
